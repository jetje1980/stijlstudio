<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Stijl DNA &middot; Stijl Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--br:#2e1a0e;--bw:#9b6240;--cr:#f7f1e8;--cd:#ede4d4;--tx:#1a1008;--mu:#8a7060;--wh:#fff;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--cr)}
body{font-family:"Jost",sans-serif;color:var(--tx);display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto}
.hdr{background:var(--wh);border-bottom:1px solid var(--cd);padding:calc(var(--st)+10px) 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-family:"Cormorant Garamond",serif;font-size:15px;font-style:italic;color:var(--br)}
.steplbl{font-size:11px;color:var(--mu)}
.prog{height:3px;background:var(--cd);flex-shrink:0}
.pbar{height:100%;background:linear-gradient(90deg,var(--bw),var(--br));transition:width .4s}
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.slide{padding:22px 16px 16px}
.ey{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--bw);font-weight:600;margin-bottom:5px}
.ttl{font-family:"Cormorant Garamond",serif;font-size:26px;font-weight:300;color:var(--br);margin-bottom:5px;line-height:1.2}
.ttl em{font-style:italic;color:var(--bw)}
.sub{font-size:13px;color:var(--mu);line-height:1.65;margin-bottom:16px}
.nin{width:100%;font-family:"Cormorant Garamond",serif;font-size:32px;font-weight:300;font-style:italic;border:none;border-bottom:2px solid var(--cd);background:transparent;color:var(--br);padding:7px 0;outline:none}
.nin:focus{border-color:var(--bw)}
.nin::placeholder{color:var(--cd)}
.slbl{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--bw);font-weight:600;margin:14px 0 6px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}
.g1{display:flex;flex-direction:column;gap:7px}
.card{background:var(--wh);border:2px solid var(--cd);border-radius:12px;padding:10px;cursor:pointer;position:relative;text-align:center;transition:all .15s}
.card:active{transform:scale(.97)}
.card.on{border-color:var(--bw);background:linear-gradient(135deg,#fff8f4,#fdf0e8)}
.card.row{display:flex;align-items:flex-start;gap:9px;text-align:left;padding:11px}
.chk{position:absolute;top:5px;right:5px;width:15px;height:15px;border-radius:50%;background:var(--bw);color:white;font-size:8px;display:none;align-items:center;justify-content:center;font-weight:700}
.card.on .chk{display:flex}
.chal{background:var(--wh);border:2px solid var(--cd);border-radius:9px;padding:11px 13px;cursor:pointer;margin-bottom:6px;position:relative;transition:all .15s}
.chal.on{border-color:var(--bw);background:#fff8f4}
.cgrp{margin-bottom:11px}
.cgl{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--mu);font-weight:600;margin-bottom:6px}
.crow{display:flex;flex-wrap:wrap;gap:7px}
.cwrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.csw{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;position:relative;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.csw.on{border-color:var(--br);transform:scale(1.1)}
.csw .ck{display:none;position:absolute;inset:0;align-items:center;justify-content:center;font-size:10px;font-weight:700;border-radius:50%}
.csw.on .ck{display:flex}
.cswl{font-size:7px;color:var(--mu);text-align:center;width:34px;line-height:1.2}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px}
.chip{padding:7px 11px;border-radius:100px;border:2px solid var(--cd);background:var(--wh);font-size:11px;font-weight:500;color:var(--mu);cursor:pointer}
.chip.on{background:var(--bw);border-color:var(--bw);color:white}
.bvsec{margin-bottom:12px}
.bvl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:6px}
.bvl.pos{color:var(--bw)}.bvl.neg{color:#5c3317}
.favin{width:100%;font-family:"Cormorant Garamond",serif;font-size:21px;font-weight:300;border:none;border-bottom:2px solid var(--cd);background:transparent;color:var(--br);padding:6px 0;outline:none;margin-bottom:13px}
.favin:focus{border-color:var(--bw)}
.favin::placeholder{color:var(--cd)}
.tbtn{padding:5px 10px;border-radius:20px;border:1.5px solid var(--cd);background:var(--wh);font-size:11px;font-family:"Jost",sans-serif;color:var(--mu);cursor:pointer}
.tbtn.on{background:var(--br);border-color:var(--br);color:var(--cr)}
.selfie-lbl{display:block;cursor:pointer;width:100%;aspect-ratio:3/4;max-height:260px;border:2px dashed var(--cd);border-radius:14px;overflow:hidden;position:relative;background:var(--cr);margin-bottom:10px}
.selfie-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;pointer-events:none}
.err{font-size:12px;color:#c0392b;margin-top:6px;min-height:16px}
.footer{border-top:1px solid var(--cd);padding:9px 14px calc(var(--sb)+9px);display:flex;gap:9px;background:var(--wh);flex-shrink:0}
.nxt{flex:1;height:48px;border-radius:100px;background:var(--br);color:var(--cr);border:none;font-family:"Jost",sans-serif;font-size:15px;font-weight:600;cursor:pointer}
.nxt:active{opacity:.85}
.bck{width:48px;height:48px;border-radius:50%;background:var(--cd);border:none;font-size:16px;cursor:pointer;color:var(--mu)}
/* UITSLAG */
.u-hero{background:linear-gradient(135deg,var(--br),#4a2810);margin:12px;border-radius:14px;padding:20px 16px;text-align:center}
.usec{margin:0 12px 9px;background:var(--wh);border-radius:11px;padding:12px 13px;box-shadow:0 2px 7px rgba(46,26,14,.05)}
.usec-t{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--bw);font-weight:600;margin-bottom:6px}
.usec-b{font-size:13px;color:var(--tx);line-height:1.7}
.ukracht{background:linear-gradient(135deg,var(--bw),#8b5230);margin:0 12px 9px;border-radius:11px;padding:12px 13px}
</style>
</head>

// EVENT DELEGATION - alle klikken gaan via de body
document.addEventListener('click', function(e) {
  var el = e.target;
  // Walk up to find data attributes
  while(el && el !== document.body) {
    if(el.dataset) {
      if(el.dataset.action) {
        handleAction(el);
        return;
      }
    }
    el = el.parentNode;
  }
});

function handleAction(el) {
  var a = el.dataset.action;
  var v = el.dataset.v;
  if(a === 'arr') { togArr(el.dataset.k, v, parseInt(el.dataset.max)||99); }
  else if(a === 'kleur') { togKleur(v); }
  else if(a === 'fig') { setFig(v); }
  else if(a === 'favcat') { setFavCat(v); }
  else if(a === 'age') { pickAge(v, el); }
  else if(a === 'idx') { togIdx(el.dataset.k, parseInt(v)); }
}

  } else if(step===6){
    h='<div class="slide"><div class="ey">Stap 6 &middot; Focus</div><div class="ttl">Wat wil je <em>benadrukken</em>?</div><div class="sub">En wat liever minder?</div>';
    h+='<div class="bvsec"><div class="bvl pos">+ Benadrukken</div><div class="chips">';
    BENS.forEach(function(o,i){var s=(ans.benadruk||[]).indexOf(i)>-1;h+='<div class="chip'+(s?' on':'')+'" data-action="idx" data-k="benadruk" data-v="'+i+'">'+o+'</div>';});
    h+='</div></div><div class="bvsec"><div class="bvl neg">- Minder</div><div class="chips">';
    VERS.forEach(function(o,i){var s=(ans.verbergen||[]).indexOf(i)>-1;h+='<div class="chip'+(s?' on':'')+'" data-action="idx" data-k="verbergen" data-v="'+i+'">'+o+'</div>';});
    h+='</div></div></div>';

  } else if(step===7){
    h='<div class="slide"><div class="ey">Stap 7 &middot; Lievelingsitem</div><div class="ttl">Jouw <em>ankerstuk</em></div>'+
      '<input class="favin" id="favin" type="text" placeholder="bijv. Mijn rode wikkelrok..." value="'+(ans.favNaam||'')+'">'+
      '<div class="slbl2">Categorie</div><div class="chips">';
    ['Top','Broek','Rok','Jurk','Jas','Schoenen','Tas'].forEach(function(cat){
      h+='<div class="chip'+(ans.favCat===cat?' on':'')+'" data-action="favcat" data-v="'+cat+'">'+cat+'</div>';
    });
    h+='</div></div>';

  } else if(step===8){
    var hasSelfie=!!ans.selfiePreview;
    h='<div class="slide"><div class="ey">Stap 8 &middot; Selfie</div>'+
      '<div class="ttl">Jouw <em>postuur</em></div>'+
      '<div class="sub">Optioneel. Helpt me proporties te personaliseren.</div>'+
      '<label class="selfie-lbl">'+
        (hasSelfie?'<img src="'+ans.selfiePreview+'" style="width:100%;height:100%;object-fit:cover;display:block">':
          '<div class="selfie-ph"><div style="font-size:44px;opacity:.35">&#128248;</div><div style="font-size:14px;font-weight:500;color:var(--tx);text-align:center">Tik hier voor camera of galerij</div></div>')+
        '<input type="file" accept="image/*" style="position:absolute;width:1px;height:1px;opacity:0;top:0;left:0" onchange="handleSelfie(event)">'+
      '</label>'+
      (hasSelfie?'<div style="font-size:12px;color:#5a8a60;text-align:center">&#10003; Foto toegevoegd</div>':
        '<div style="font-size:12px;color:var(--mu);text-align:center">Sla over als je wil</div>')+
    '</div>';

  } else if(step===9){
    h='<div class="slide"><div class="ey">Stap 9 &middot; No-gos</div><div class="ttl">Wat draag je <em>absoluut niet</em>?</div><div class="sub">Optioneel.</div><div class="chips">';
    NOGS.forEach(function(o,i){var s=(ans.nogo||[]).indexOf(i)>-1;h+='<div class="chip'+(s?' on':'')+'" data-action="idx" data-k="nogo" data-v="'+i+'">'+o+'</div>';});
    h+='</div></div>';
  }

  b.innerHTML=h;
  b.scrollTop=0;
  if(step===0)setTimeout(function(){var el=document.getElementById('nin');if(el)el.focus();},80);
  if(step===7)setTimeout(function(){var el=document.getElementById('favin');if(el)el.focus();},80);
}

function handleSelfie(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){ans.selfiePreview=ev.target.result;render();};r.readAsDataURL(f);}
function pickAge(v,el){ans.leeftijd=v;document.querySelectorAll('[data-action="age"]').forEach(function(b){b.classList.toggle('on',b.dataset.v===v);});}
function togArr(key,val,max){var a=ans[key]||[];var i=a.indexOf(val);if(i>-1)a.splice(i,1);else{if(a.length>=max)a.shift();a.push(val);}ans[key]=a;render();}
function togKleur(n){var a=ans.kleuren||[];var i=a.indexOf(n);if(i>-1)a.splice(i,1);else a.push(n);ans.kleuren=a;render();}
function setFig(k){ans.figuur=k;render();}
function togIdx(key,i){var a=ans[key]||[];var idx=a.indexOf(i);if(idx>-1)a.splice(idx,1);else a.push(i);ans[key]=a;
  document.querySelectorAll('[data-action="idx"][data-k="'+key+'"][data-v="'+i+'"]').forEach(function(el){el.classList.toggle('on',a.indexOf(i)>-1);});}
function setFavCat(cat){ans.favCat=cat;document.querySelectorAll('[data-action="favcat"]').forEach(function(el){el.classList.toggle('on',el.dataset.v===cat);});}

function next(){
  if(step===0){
    var el=document.getElementById('nin');if(el)ans.name=el.value.trim();
    if(!ans.name){var err=document.getElementById('nerr');if(err)err.textContent='Vul je naam in.';setTimeout(function(){var e2=document.getElementById('nerr');if(e2)e2.textContent='';},2000);return;}
  }
  if(step===7){var el2=document.getElementById('favin');if(el2&&el2.value.trim())ans.favNaam=el2.value.trim();}
  if(step<NS-1){step++;render();}else{finish();}
}
function prev(){if(step>0){step--;render();}}

function finish(){
  var archs=ans.archetypes||['naturel'];
  var pK=archs[0]||'naturel';
  var ar=ARCHS[pK]||ARCHS.naturel;
  var ar2=archs[1]?ARCHS[archs[1]]:null;
  var fig=ans.figuur||'gelijkmatig';
  var figTip=ar.fig&&ar.fig[fig]?ar.fig[fig]:'';
  var benL=(ans.benadruk||[]).map(function(i){return BENS[i]||'';}).filter(Boolean);
  var verL=(ans.verbergen||[]).map(function(i){return VERS[i]||'';}).filter(Boolean);
  var nogoL=(ans.nogo||[]).map(function(i){return NOGS[i]||'';}).filter(Boolean);
  var kl=ans.kleuren||[];
  var wc=0,kc=0;
  kl.forEach(function(k){if(['Terra','Camel','Bruin','Oker','Olijf'].indexOf(k)>-1)wc++;if(['Navy','Kobalt','Smaragd','Paars'].indexOf(k)>-1)kc++;});
  var kt=wc>kc?'warm':kc>wc?'koel':'neutraal';
  var prof={
    name:ans.name||'Gebruiker',leeftijd:ans.leeftijd||'',selfie:ans.selfiePreview||null,
    stijlDNA:{
      archetypes:archs,primaryArchetype:pK,
      kibbe:ar.kibbe+(ar2?' / '+ar2.kibbe:''),kitchener:ar.kitchener+(ar2?' / '+ar2.kitchener:''),
      uitdagingen:ans.uitdagingen||[],uitstraling:ans.uitstraling||[],
      figuur:fig,figuurTip:figTip,benadruk:benL,verbergen:verL,
      kleuren:kl,kleurtemp:kt,nogo:nogoL,
      favNaam:ans.favNaam||'',favCat:ans.favCat||'',
      beschrijving:ar.beschrijving||'',kracht:ar.kracht||'',tip:ar.tip||'',
      kw:(ar.kw||[]).concat(ar2&&ar2.kw?ar2.kw.slice(0,2):[]),
      silhouet:ar.silhouet||'',proporties:ar.proporties||'',
      materialen:(ar.materialen||[]).concat(ar2&&ar2.materialen?ar2.materialen.slice(0,2):[]),
      materialen_vermijd:ar.materialen_vermijd||[],
      sleutelitems:(ar.sleutelitems||[]).concat(ar2&&ar2.sleutelitems?ar2.sleutelitems.slice(0,2):[]),
      kleuren_basis:ar.kleuren_basis||[],kleuren_accent:ar.kleuren_accent||[]
    }
  };
  try{localStorage.setItem('ss-prof-'+CODE,JSON.stringify(prof));}catch(e){}
  fetch(SB+'/rest/v1/users',{method:'POST',headers:{'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK,'Prefer':'return=minimal,resolution=merge-duplicates'},body:JSON.stringify({code:CODE,naam:prof.name,style_dna:prof.stijlDNA,last_seen:new Date().toISOString()})}).catch(function(){});
  step=NS;render();renderUitslag(prof,ar,ar2,figTip,benL,verL,nogoL);
}

function renderUitslag(prof,ar,ar2,figTip,benL,verL,nogoL){
  if(!prof)return;
  var dna=prof.stijlDNA;
  var kw=dna.kw||[];
  var klH=(dna.kleuren||[]).map(function(k){var c=CMAP[k]||'#888';return '<div class="cwrap"><div style="width:22px;height:22px;border-radius:50%;background:'+c+';'+(k==='Wit'?'border:1px solid #CCC':'')+';"></div><div class="cswl">'+k+'</div></div>';}).join('');
  function chip(t,bad){return '<span class="uc'+(bad?' bad':'')+'">'+(t||'')+'</span>';}
  var h='';
  h+='<div class="u-hero">'+
    '<div style="font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(240,212,192,.6);margin-bottom:6px">Jouw Stijl DNA</div>'+
    '<div class="u-nm">'+prof.name+(prof.leeftijd?' &middot; '+prof.leeftijd:'')+'</div>'+
    '<div class="u-ar">'+(ar.naam||dna.primaryArchetype||'')+(ar2?' &times; '+(ar2.naam||dna.archetypes[1]):'')+'</div>'+
    '<div class="u-tags">'+kw.map(function(k){return '<span class="u-tag">'+k+'</span>';}).join('')+'</div></div>';
  if(prof.selfie)h+='<div style="padding:0 12px 12px"><img src="'+prof.selfie+'" style="width:100%;border-radius:12px;max-height:200px;object-fit:cover;display:block"></div>';
  h+='<div class="usec"><div class="usec-t">Wie jij bent</div><div class="usec-b">'+(dna.beschrijving||'')+'<br><br><em style="color:var(--bw)">'+(dna.kracht||'')+'</em></div></div>';
  h+='<div class="ukracht"><div class="ukracht-t">Jouw stijlwapen</div><div class="ukracht-b">'+(dna.tip||'')+'</div></div>';
  h+='<div class="usec"><div class="usec-t">Silhouet & proporties</div><div class="usec-b">'+(dna.silhouet||'')+(dna.proporties?'<br><br><strong>Regel:</strong> '+dna.proporties:'')+(figTip?'<br><br><strong>Figuuradvies:</strong> '+figTip:'')+(benL.length?'<br><em>Benadrukken: '+benL.join(', ')+'</em>':'')+'</div></div>';
  if(dna.materialen&&dna.materialen.length)h+='<div class="usec"><div class="usec-t">Materialen</div><div class="usec-b"><strong>Voor jou:</strong> '+dna.materialen.join(', ')+(dna.materialen_vermijd&&dna.materialen_vermijd.length?'<br><strong>Vermijd:</strong> '+dna.materialen_vermijd.join(', '):'')+'</div></div>';
  if(klH)h+='<div class="usec"><div class="usec-t">Kleuren</div><div class="usec-b"><div style="display:flex;flex-wrap:wrap;gap:7px">'+klH+'</div></div></div>';
  if(dna.sleutelitems&&dna.sleutelitems.length)h+='<div class="usec"><div class="usec-t">Sleutelitems</div><div class="usec-b">'+dna.sleutelitems.map(function(i){return chip(i,false);}).join('')+'</div></div>';
  if(nogoL&&nogoL.length)h+='<div class="usec"><div class="usec-t">No-go&apos;s</div><div class="usec-b">'+nogoL.map(function(n){return chip(n,true);}).join('')+'</div></div>';
  h+='<a href="griette_stylist_BETA.html" class="gobtn">Naar mijn garderobe &#8594;</a>';
  document.getElementById('body').innerHTML=h;
  document.getElementById('body').scrollTop=0;
}

render();
</script>
</body>
</html>
