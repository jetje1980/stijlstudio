<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Stijl DNA · Stijl Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--br:#2e1a0e;--bw:#9b6240;--cr:#f7f1e8;--cd:#ede4d4;--tx:#1a1008;--mu:#8a7060;--wh:#fff;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--cr)}
body{font-family:'Jost',sans-serif;color:var(--tx);display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto}
.hdr{background:var(--wh);border-bottom:1px solid var(--cd);padding:calc(var(--st) + 10px) 18px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:var(--br)}
.steplbl{font-size:11px;color:var(--mu);font-weight:500}
.prog{height:3px;background:var(--cd);flex-shrink:0}
.progbar{height:100%;background:linear-gradient(90deg,var(--bw),var(--br));transition:width .4s;border-radius:0 2px 2px 0}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.slide{padding:24px 18px 20px;animation:si .3s ease}
@keyframes si{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
.ey{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--bw);font-weight:600;margin-bottom:6px}
.ttl{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;line-height:1.2;color:var(--br);margin-bottom:6px}
.ttl em{font-style:italic;color:var(--bw)}
.sub{font-size:13px;color:var(--mu);line-height:1.65;margin-bottom:18px;font-weight:300}
.hint{font-size:11px;color:var(--bw);font-weight:600;margin-bottom:10px}
/* name */
.nin{width:100%;font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;font-style:italic;border:none;border-bottom:2px solid var(--cd);background:transparent;color:var(--br);padding:8px 0;outline:none;transition:border-color .2s}
.nin:focus{border-color:var(--bw)}
.nin::placeholder{color:var(--cd)}
/* grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:6px}
.g1{display:flex;flex-direction:column;gap:8px;margin-bottom:6px}
.card{background:var(--wh);border:2px solid var(--cd);border-radius:14px;padding:12px 10px;cursor:pointer;transition:all .18s;position:relative;text-align:center;box-shadow:0 1px 5px rgba(46,26,14,.06)}
.card:active{transform:scale(.97)}
.card.sel{border-color:var(--bw);background:linear-gradient(135deg,#fff8f4,#fdf0e8)}
.card.row{display:flex;align-items:flex-start;gap:10px;text-align:left;padding:12px}
.card-ico{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ce{font-size:24px;display:block;margin-bottom:4px}
.cl{font-size:12px;font-weight:600;color:var(--tx);line-height:1.2;margin-bottom:2px}
.cs{font-size:10px;color:var(--mu);font-weight:300;line-height:1.35}
.chk{position:absolute;top:6px;right:6px;width:17px;height:17px;border-radius:50%;background:var(--bw);color:white;font-size:9px;display:none;align-items:center;justify-content:center;font-weight:700}
.card.sel .chk{display:flex}
/* chal */
.chal{background:var(--wh);border:2px solid var(--cd);border-radius:10px;padding:12px 14px;cursor:pointer;margin-bottom:7px;position:relative;transition:all .18s;box-shadow:0 1px 4px rgba(46,26,14,.05)}
.chal:active{transform:scale(.99)}
.chal.sel{border-color:var(--bw);background:#fff8f4}
.chal .chk{display:none}
.chal.sel .chk{display:flex}
.chal-t{font-size:13px;font-weight:500;color:var(--tx);line-height:1.4}
.chal-s{font-size:10px;color:var(--mu);margin-top:3px}
/* colors */
.cgrp{margin-bottom:12px}
.cgl{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--mu);font-weight:600;margin-bottom:7px}
.crow{display:flex;flex-wrap:wrap;gap:8px}
.cwrap{display:flex;flex-direction:column;align-items:center;gap:3px}
.csw{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .18s;position:relative;box-shadow:0 1px 5px rgba(0,0,0,.12)}
.csw.sel{border-color:var(--br);transform:scale(1.12)}
.csw .ck{display:none;position:absolute;inset:0;align-items:center;justify-content:center;font-size:11px;font-weight:700;border-radius:50%}
.csw.sel .ck{display:flex}
.cswl{font-size:7px;color:var(--mu);text-align:center;width:36px;line-height:1.2}
/* chips */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{padding:7px 12px;border-radius:100px;border:2px solid var(--cd);background:var(--wh);font-size:11px;font-weight:500;color:var(--mu);cursor:pointer;transition:all .15s;font-family:'Jost',sans-serif}
.chip.sel{background:var(--bw);border-color:var(--bw);color:white}
/* benvb */
.bvsec{margin-bottom:14px}
.bvl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:7px}
.bvl.pos{color:var(--bw)}
.bvl.neg{color:#5c3317}
/* fav */
.favin{width:100%;font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;border:none;border-bottom:2px solid var(--cd);background:transparent;color:var(--br);padding:6px 0;outline:none;margin-bottom:14px;transition:border-color .2s}
.favin:focus{border-color:var(--bw)}
.favin::placeholder{color:var(--cd)}
/* footer */
.footer{border-top:1px solid var(--cd);padding:10px 16px calc(var(--sb) + 10px);display:flex;gap:10px;background:var(--wh);flex-shrink:0}
.nxt{flex:1;height:50px;border-radius:100px;background:var(--br);color:var(--cr);border:none;font-family:'Jost',sans-serif;font-size:15px;font-weight:600;cursor:pointer}
.nxt:active{opacity:.85}
.nxt:disabled{background:var(--cd);color:var(--mu);cursor:not-allowed}
.bck{width:50px;height:50px;border-radius:50%;background:var(--cd);border:none;font-size:16px;cursor:pointer;color:var(--mu)}
/* uitslag */
.uitslag{padding-bottom:24px}
.u-hero{background:linear-gradient(135deg,var(--br),#4a2810);margin:14px;border-radius:16px;padding:22px 18px;text-align:center;position:relative;overflow:hidden}
.u-hero::after{content:'✦';position:absolute;right:-8px;bottom:-18px;font-size:100px;color:rgba(255,255,255,.04);pointer-events:none}
.u-ey{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(240,212,192,.6);margin-bottom:7px}
.u-nm{font-family:'Cormorant Garamond',serif;font-size:32px;font-style:italic;font-weight:300;color:white;margin-bottom:3px}
.u-ar{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:rgba(240,212,192,.85);margin-bottom:14px}
.u-tags{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.u-tag{padding:4px 10px;border-radius:100px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);font-size:10px;color:white}
.u-tag.sec{background:rgba(155,98,64,.25);border-color:rgba(155,98,64,.3);color:#f0d4c0}
.usec{margin:0 14px 10px;background:var(--wh);border-radius:12px;padding:13px 14px;box-shadow:0 2px 8px rgba(46,26,14,.06)}
.usec-t{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--bw);font-weight:600;margin-bottom:7px}
.usec-b{font-size:13px;color:var(--tx);line-height:1.7;font-weight:300}
.u-kracht{background:linear-gradient(135deg,var(--bw),#8b5230);margin:0 14px 10px;border-radius:12px;padding:13px 14px}
.u-kracht-t{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.55);font-weight:600;margin-bottom:4px}
.u-kracht-b{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:white;line-height:1.5}
.uc{display:inline-block;padding:3px 9px;border-radius:100px;background:var(--cd);color:#5c3317;font-size:10px;margin:2px}
.uc.bad{background:#fee4e4;color:#c0392b}
.cdots{display:flex;flex-wrap:wrap;gap:9px}
.cdw{display:flex;flex-direction:column;align-items:center;gap:3px}
.cdot{width:24px;height:24px;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.12)}
.cdotl{font-size:7px;color:var(--mu);text-align:center;width:28px;line-height:1.2}
.u-fig{background:linear-gradient(135deg,#fff8f4,#fdf0e8);border-left:3px solid var(--bw);margin:0 14px 10px;border-radius:12px;padding:13px 14px}
.u-chal-step{display:flex;gap:8px;margin-bottom:5px;align-items:flex-start}
.u-chal-num{min-width:19px;height:19px;border-radius:50%;background:var(--bw);color:white;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.beginbtn{display:block;width:calc(100% - 28px);margin:0 14px 14px;padding:14px;background:var(--br);color:var(--cr);border:none;border-radius:12px;font-size:15px;font-weight:600;font-family:'Jost',sans-serif;cursor:pointer;text-align:center}
</style>
</head>

];
var CMAP={};KLGROUPS.forEach(function(g){g.items.forEach(function(o){CMAP[o.n]=o.c;});});

var FIGS=[{e:'△',l:'Schouders breder',s:'Schouders opvallend breder dan heupen',k:'schouders_breed'},{e:'▽',l:'Heupen breder',s:'Heupen breder dan schouders',k:'heupen_breed'},{e:'▭',l:'Gelijkmatig',s:'Weinig taille-insprong, rechte lijn',k:'gelijkmatig'},{e:'✦',l:'Zandloper',s:'Duidelijk smallere taille',k:'zandloper'},{e:'○',l:'Vol & rond',s:'Rondingen allover',k:'rondingen'},{e:'|',l:'Slank & lang',s:'Rechtlijnig, weinig curves',k:'slank'}];
var BENS=['Taille benadrukken','Benen verlengen','Decolleté openen','Schouders breed laten lijken','Liever niets specifiek'];
var VERS=['Buik minder zichtbaar','Heupen smaller laten lijken','Bovenlichaam minimaliseren','Dijen minder breed','Liever niets'];
var NOGOS=['Grote prints','Grote logos','Crop tops','Hoge hakken','Glanzende synthetische stoffen','Gesloten halslijnen','Micro-minirokjes','Diep décolleté','Pofmouwen','Legging als broek'];

var step=0,ans={},NS=9;

function pickFavCat(el){ans.favCat=el.dataset.cat;document.querySelectorAll(".favccat").forEach(function(b){b.classList.toggle("sel",b.dataset.cat===ans.favCat);});}
function render(){
  var pct=Math.round((step/NS)*100);
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('slbl').textContent=step<NS?'Stap '+(step+1)+' van '+NS:'Jouw Stijl DNA';
  document.getElementById('bck').style.display=step>0&&step<NS?'flex':'none';
  document.getElementById('nxt').textContent=step===NS-1?'Afronden ✦':step>=NS?'Begin met stylen →':'Verder →';
  document.getElementById('nxt').disabled=false;
  document.getElementById('footer').style.display=step>=NS?'none':'flex';

  if(step>=NS){renderUitslag();return;}

  var c=document.getElementById('content');
  var h='<div class="slide">';
  if(step===0){
    h+='<div class="ey">Welkom</div><div class="ttl">Hoe heet je?</div><div class="sub">Ik maak een stijlprofiel dat écht bij jou past.</div>';
    h+='<input class="nin" id="nin" type="text" placeholder="Jouw naam..." autocomplete="given-name" value="'+(ans.name||'')+'" oninput="ans.name=this.value;document.getElementById(\'nxt\').disabled=!this.value.trim()">';
    document.getElementById('nxt').disabled=!(ans.name&&ans.name.trim());
  }else if(step===1){
    h+='<div class="ey">Stap 1 · Uitstraling</div><div class="ttl">Wat wil je dat mensen <em>voelen</em>?</div><div class="sub">Als ze jou zien. Kies alles wat resoneert.</div>';
    h+='<div class="hint">Kies meerdere</div><div class="g2">';
    [{e:'⚡',l:'Krachtig',s:'Ik heb hier de leiding'},{e:'✨',l:'Zelfverzekerd',s:'Ik weet wie ik ben'},{e:'🌿',l:'Rustig & at ease',s:'Ik hoef niets te bewijzen'},{e:'🎨',l:'Creatief & uniek',s:'Ik ben niet als de rest'},{e:'🌸',l:'Warm & vrouwelijk',s:'Zacht maar sterk'},{e:'🤍',l:'Elegant & verfijnd',s:'Stijl zonder effort'}].forEach(function(o){
      var sel=(ans.uitstraling||[]).includes(o.l);
      h+='<div class="card'+(sel?' sel':'')+'" onclick="toggleArr(\'uitstraling\',\''+o.l+'\',99,this)"><div class="chk">✓</div><span class="ce">'+o.e+'</span><div class="cl">'+o.l+'</div><div class="cs">'+o.s+'</div></div>';
    });
    h+='</div>';
  }else if(step===2){
    h+='<div class="ey">Stap 2 · Archetype</div><div class="ttl">Wie jij <em>bent</em></div><div class="sub">Kies maximaal 2 — combinaties zijn normaal.</div>';
    h+='<div class="hint">Max 2</div><div class="g1">';
    [{e:'🤍',bg:'#F0E8DC',l:'De Klassieke',d:'Tijdloos, gestructureerd, elegantie boven trends.',k:'klassiek'},{e:'🎨',bg:'#F0E0F4',l:'De Créateur',d:'Expressief, verrassend, kleding als communicatie.',k:'createur'},{e:'🌿',bg:'#E0F0E8',l:'De Naturel',d:'Moeiteloos, authentiek, comfort is geen compromis.',k:'naturel'},{e:'🌸',bg:'#F4E0E8',l:'De Romantische',d:'Vrouwelijk, zacht, aandacht voor detail.',k:'romantisch'},{e:'⚡',bg:'#E0E4F4',l:'De Stoere',d:'Krachtig, direct, sterke lijnen.',k:'stoer'},{e:'◼',bg:'#EBEBEB',l:'De Moderne',d:'Minimaal, intentioneel, minder is meer.',k:'modern'}].forEach(function(o){
      var sel=(ans.archetypes||[]).includes(o.k);
      h+='<div class="card row'+(sel?' sel':'')+'" onclick="toggleArr(\'archetypes\',\''+o.k+'\',2,this)"><div class="chk">✓</div><div class="card-ico" style="background:'+o.bg+'">'+o.e+'</div><div><div class="cl">'+o.l+'</div><div class="cs">'+o.d+'</div></div></div>';
    });
    h+='</div>';
  }else if(step===3){
    h+='<div class="ey">Stap 3 · Uitdaging</div><div class="ttl">Waar herken je <em>jezelf</em> in?</div><div class="sub">Kies maximaal 2.</div>';
    h+='<div class="hint">Max 2</div>';
    [{l:'Ik weet niet hoe ik dingen goed moet combineren',s:'Ik zie potentieel maar breng het niet samen',k:'combineren'},{l:'Ik koop veel maar draag weinig',s:'Volle kast, maar niets aan',k:'teveel'},{l:'Ik weet niet wat bij me past qua stijl',s:'Nog op zoek naar mijn eigen stijl',k:'watikmij'},{l:'Ik herken mezelf niet in mijn kleding',s:'Wat ik draag voelt niet als ik',k:'mezelf'},{l:'Ik kleed me voor anderen, niet voor mezelf',s:'Ik pas me aan in plaats van mezelf te zijn',k:'anderen'},{l:'Ik heb geen overzicht over mijn garderobe',s:'Ik weet niet eens wat ik allemaal heb',k:'overzicht'}].forEach(function(o){
      var sel=(ans.uitdagingen||[]).includes(o.k);
      h+='<div class="chal'+(sel?' sel':'')+'" onclick="toggleArr(\'uitdagingen\',\''+o.k+'\',2,this)"><div class="chk">✓</div><div class="chal-t">'+o.l+'</div><div class="chal-s">'+o.s+'</div></div>';
    });
  }else if(step===4){
    h+='<div class="ey">Stap 4 · Kleuren</div><div class="ttl">Welke kleuren zijn <em>jij</em>?</div><div class="sub">Kies meerdere. Wat draag je graag?</div>';
    KLGROUPS.forEach(function(g){
      h+='<div class="cgrp"><div class="cgl">'+g.l+'</div><div class="crow">';
      g.items.forEach(function(o){
        var sel=(ans.kleuren||[]).includes(o.n);
        h+='<div class="cwrap"><div class="csw'+(sel?' sel':'')+'" data-kleur="'+o.n+'" onclick="toggleKleur(this)" style="background:'+o.c+';'+(o.b?'border:1.5px solid #CCC;':'')+'">' +
          '<div class="ck" style="color:'+(o.t==='w'?'white':'#333')+'">✓</div></div>'+
          '<div class="cswl">'+o.n+'</div></div>';
      });
      h+='</div></div>';
    });
    var kl=ans.kleuren||[];
    h+='<div style="font-size:12px;color:var(--mu);margin-top:4px">'+(kl.length?kl.join(' · '):'Nog niets geselecteerd')+'</div>';
  }else if(step===5){
    h+='<div class="ey">Stap 5 · Figuur</div><div class="ttl">Jouw <em>lichaam</em></div><div class="sub">Zo geef ik proportietips die echt werken.</div>';
    h+='<div class="g2">';
    FIGS.forEach(function(o){
      var sel=ans.figuur===o.k;
      h+='<div class="card'+(sel?' sel':'')+'" onclick="setFig(\''+o.k+'\',this)"><div class="chk">✓</div><span class="ce" style="font-size:20px">'+o.e+'</span><div class="cl">'+o.l+'</div><div class="cs">'+o.s+'</div></div>';
    });
    h+='</div>';
  }else if(step===6){
    h+='<div class="ey">Stap 6 · Focus</div><div class="ttl">Wat wil je <em>benadrukken</em>?</div><div class="sub">En wat liever minder zichtbaar?</div>';
    h+='<div class="bvsec"><div class="bvl pos">✦ Benadrukken</div><div class="chips">';
    BENS.forEach(function(o,i){var sel=(ans.benadruk||[]).includes(i);h+='<div class="chip'+(sel?' sel':'')+'" onclick="toggleIdx(\'benadruk\','+i+',this)">'+o+'</div>';});
    h+='</div></div><div class="bvsec"><div class="bvl neg">◎ Minder zichtbaar</div><div class="chips">';
    VERS.forEach(function(o,i){var sel=(ans.verbergen||[]).includes(i);h+='<div class="chip'+(sel?' sel':'')+'" onclick="toggleIdx(\'verbergen\','+i+',this)">'+o+'</div>';});
    h+='</div></div>';
  }else if(step===7){
    h+='<div class="ey">Stap 7 · Lievelingsitem</div><div class="ttl">Jouw <em>anker-stuk</em></div><div class="sub">Het item dat altijd werkt en je blij maakt.</div>';
    h+='<input class="favin" id="favin" type="text" placeholder="bijv. Mijn rode wikkelrok..." value="'+(ans.favNaam||'')+'" oninput="ans.favNaam=this.value">';
    h+='<div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--bw);margin-bottom:7px;font-weight:600">Wat voor stuk?</div>';
    h+='<div class="chips">';
    ['Top','Broek','Rok','Jurk','Jas','Schoenen','Tas','Accessoire'].forEach(function(c){h+='<div class="chip'+(ans.favCat===c?' sel':'')+' favccat" data-cat="'+c+'" onclick="pickFavCat(this)">'+c+'</div>';});this.classList.add(\'sel\');this.classList.add(\'favccat\')" style="extra:none">'+c+'</div>';});
    h+='</div>';
  }else if(step===8){
    h+='<div class="ey">Stap 8 · No-go\'s</div><div class="ttl">Wat draag je <em>absoluut niet</em>?</div><div class="sub">Optioneel — ik houd hier rekening mee.</div>';
    h+='<div class="chips">';
    NOGOS.forEach(function(o,i){var sel=(ans.nogo||[]).includes(i);h+='<div class="chip'+(sel?' sel':'')+'" onclick="toggleIdx(\'nogo\','+i+',this)">'+o+'</div>';});
    h+='</div>';
  }
  h+='</div>';
  c.innerHTML=h;
  if(step===0)setTimeout(function(){var n=document.getElementById('nin');if(n)n.focus();},100);
  if(step===7)setTimeout(function(){var n=document.getElementById('favin');if(n)n.focus();},100);
  c.scrollTop=0;
}

function toggleArr(key,val,max,el){
  var a=ans[key]||[];
  if(a.includes(val)){a=a.filter(function(x){return x!==val;});}
  else{if(a.length>=max)a=a.slice(-(max-1));a.push(val);}
  ans[key]=a;render();
}
function toggleKleur(el){
  var k=el.dataset.kleur;var a=ans.kleuren||[];
  if(a.includes(k))a=a.filter(function(x){return x!==k;});else a.push(k);
  ans.kleuren=a;render();
}
function setFig(k){ans.figuur=k;render();}
function toggleIdx(key,i,el){
  var a=ans[key]||[];
  if(a.includes(i))a=a.filter(function(x){return x!==i;});else a.push(i);
  ans[key]=a;el.classList.toggle('sel',a.includes(i));
}

function next(){
  if(step===0){if(!(ans.name&&ans.name.trim()))return;}
  if(step<NS-1){step++;render();}
  else if(step===NS-1){step=NS;finish();}
  else if(step>=NS){window.location.href='griette_stylist_BETA.html';}
}
function prev(){if(step>0&&step<NS){step--;render();}}

function finish(){
  var kl=ans.kleuren||[];
  var wKl=['Terra','Bruin','Camel','Oker','Oranje','Zand','Olijf'];
  var kKl=['Navy','Kobalt','Lichtblauw','Smaragd','Paars','Mauve','Antraciet'];
  var wc=kl.filter(function(k){return wKl.includes(k);}).length;
  var kc=kl.filter(function(k){return kKl.includes(k);}).length;
  var kt=wc>kc?'warm':kc>wc?'koel':'neutraal';
  var archs=ans.archetypes||['naturel'];
  var pK=archs[0]||'naturel';
  var ar=ARCHS[pK];
  var fig=ans.figuur||'gelijkmatig';
  var figTip=ar.fig[fig]||ar.fig.gelijkmatig;
  var benL=(ans.benadruk||[]).map(function(i){return BENS[i];}).filter(Boolean);
  var verL=(ans.verbergen||[]).map(function(i){return VERS[i];}).filter(Boolean);
  var nogoL=(ans.nogo||[]).map(function(i){return NOGOS[i];}).filter(Boolean);
  var ar2=archs[1]?ARCHS[archs[1]]:null;

  var dna={
    archetypes:archs, primaryArchetype:pK,
    uitdagingen:ans.uitdagingen||[], uitstraling:ans.uitstraling||[],
    kibbe:ar.kibbe+(ar2?' / '+ar2.kibbe:''),
    kitchener:ar.kitchener+(ar2?' / '+ar2.kitchener:''),
    beschrijving:ar.beschrijving+(ar2?'\n\n'+ar2.naam+': '+ar2.beschrijving:''),
    kracht:ar.kracht, tip:ar.tip,
    silhouet:ar.silhouet, proporties:ar.proporties,
    materialen:ar.materialen, materialen_vermijd:ar.materialen_vermijd,
    kleuren:kl, kleurtemp:kt,
    kleuren_basis:ar.kleuren_basis, kleuren_accent:ar.kleuren_accent,
    figuur:fig, figuurTip:figTip,
    benadruk:benL, verbergen:verL,
    nogo:nogoL, favNaam:ans.favNaam||'', favCat:ans.favCat||'',
    sleutelitems:ar.sleutelitems, kw:ar.kw
  };

  var prof={name:ans.name,stijlDNA:dna,createdAt:new Date().toISOString()};
  try{localStorage.setItem('ss-prof-'+CODE,JSON.stringify(prof));}catch(e){}

  // Save to Supabase
  fetch(SB_URL+'/rest/v1/users',{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=minimal,resolution=merge-duplicates'},body:JSON.stringify({code:CODE,naam:ans.name,style_dna:dna,last_seen:new Date().toISOString()})}).catch(function(){});

  renderUitslag(prof);
}

function renderUitslag(prof){
  if(!prof){try{prof=JSON.parse(localStorage.getItem('ss-prof-'+CODE)||'null');}catch(e){}}
  if(!prof){window.location.href='griette_stylist_BETA.html';return;}
  var dna=prof.stijlDNA;
  var archs=dna.archetypes||[dna.primaryArchetype||'naturel'];
  var ar=ARCHS[archs[0]]||ARCHS.naturel;
  var ar2=archs[1]?ARCHS[archs[1]]:null;
  var ch0=CHALS[(dna.uitdagingen||['combineren'])[0]]||CHALS.combineren;
  var ch1=dna.uitdagingen&&dna.uitdagingen[1]?CHALS[dna.uitdagingen[1]]:null;

  document.getElementById('slbl').textContent='Jouw Stijl DNA';
  document.getElementById('footer').style.display='none';

  function sec(title,body){return '<div class="usec"><div class="usec-t">'+title+'</div><div class="usec-b">'+body+'</div></div>';}
  function chips(arr,bad){return arr.map(function(x){return '<span class="uc'+(bad?' bad':'')+'">'+(typeof x==='string'?x:x)+'</span>';}).join('');}

  var klDotsH=(dna.kleuren||[]).map(function(k){var c=CMAP[k]||'#888';return '<div class="cdw"><div class="cdot" style="background:'+c+';'+(k==='Wit'||k==='Creme'?'border:1px solid #DDD':'')+';"></div><div class="cdotl">'+k+'</div></div>';}).join('');

  var h='<div class="uitslag">';
  h+='<div class="u-hero">'+
    '<div class="u-ey">Jouw Stijl DNA</div>'+
    '<div class="u-nm">Hoi, '+prof.name+'!</div>'+
    '<div class="u-ar">'+ar.naam+(ar2?' × '+ar2.naam:'')+'</div>'+
    '<div class="u-tags">'+
      ar.kw.map(function(k){return '<span class="u-tag">'+k+'</span>';}).join('')+
      (ar2?ar2.kw.slice(0,2).map(function(k){return '<span class="u-tag sec">'+k+'</span>';}).join(''):'')+
    '</div>'+
  '</div>';

  h+=sec('Wie jij bent',
    ar.beschrijving.replace(/\n\n/g,'<br><br>')+(ar2?'<br><br><strong>'+ar2.naam+':</strong> '+ar2.beschrijving:'')+
    '<div class="usec-sub" style="margin-top:8px">Kibbe: '+ar.kibbe+' · Kitchener: '+ar.kitchener+'</div>'
  );

  h+='<div class="u-kracht"><div class="u-kracht-t">Jouw kracht</div><div class="u-kracht-b">'+ar.kracht+'</div></div>';

  h+=sec('Silhouet & proporties', ar.silhouet+'<br><br><strong>Proporties:</strong> '+ar.proporties);

  h+=sec('Materialen voor jou',
    '<div style="margin-bottom:6px;font-size:10px;font-weight:600;color:var(--bw)">Werken goed:</div>'+
    '<div style="margin-bottom:10px">'+chips(ar.materialen)+'</div>'+
    '<div style="margin-bottom:6px;font-size:10px;font-weight:600;color:#5c3317">Vermijd:</div>'+
    chips(ar.materialen_vermijd,true)
  );

  if(klDotsH)h+=sec('Jouw kleuren ('+dna.kleurtemp+')','<div class="cdots">'+klDotsH+'</div>');

  h+='<div class="u-fig">'+
    '<div class="usec-t">Figuuradvies · '+dna.figuur+'</div>'+
    '<div class="usec-b">'+dna.figuurTip+
    (dna.benadruk&&dna.benadruk.length?'<br><br><strong>Benadrukken:</strong> '+dna.benadruk.join(', '):'')+
    (dna.verbergen&&dna.verbergen.length?'<br><strong>Minder tonen:</strong> '+dna.verbergen.join(', '):'')+
    '</div></div>';

  h+='<div class="usec"><div class="usec-t">Jouw uitdaging'+( ch1?'en':'')+'</div>'+
    '<div class="usec-b"><strong>'+ch0.d+'</strong><br>'+ch0.tip+'<br><br>'+
    [ch0.s1,ch0.s2,ch0.s3].map(function(s,i){return '<div class="u-chal-step"><div class="u-chal-num">'+(i+1)+'</div><div>'+s+'</div></div>';}).join('')+
    (ch1?'<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--cd)"><strong>'+ch1.d+':</strong> '+ch1.tip+'</div>':'')+
    '</div></div>';

  h+=sec('Sleutelitems voor jouw garderobe','<div>'+chips(ar.sleutelitems.map(function(i){return '✦ '+i;}))+'</div>');

  if(dna.nogo&&dna.nogo.length)h+=sec('No-go\'s','<div>'+chips(dna.nogo,true)+'</div>');
  if(dna.favNaam)h+='<div class="usec"><div class="usec-t">Lievelingsitem ✦</div><div class="usec-b"><strong>'+dna.favNaam+(dna.favCat?' · '+dna.favCat:'')+'</strong><br>Ik gebruik dit als anker voor al jouw combinatieadviezen.</div></div>';

  h+='<button class="beginbtn" onclick="window.location.href=\'griette_stylist_BETA.html\'">Begin met stylen →</button>';
  h+='</div>';

  document.getElementById('content').innerHTML=h;
  document.getElementById('content').scrollTop=0;
}

render();
</script>
</body>
</html>
