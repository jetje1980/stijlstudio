<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Stijl DNA · Stijl Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--br:#2e1a0e;--bw:#9b6240;--cr:#f7f1e8;--cd:#ede4d4;--tx:#1a1008;--mu:#8a7060;--wh:#fff;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--cr)}
body{font-family:'Jost',sans-serif;color:var(--tx);display:flex;flex-direction:column;height:100vh;height:100svh;max-width:430px;margin:0 auto}
.hdr{background:var(--wh);border-bottom:1px solid var(--cd);padding:calc(var(--st) + 10px) 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:var(--br)}
.steplbl{font-size:11px;color:var(--mu);font-weight:500}
.prog{height:3px;background:var(--cd);flex-shrink:0}
.pbar{height:100%;background:linear-gradient(90deg,var(--bw),var(--br));transition:width .4s;border-radius:0 2px 2px 0}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.slide{padding:22px 16px 16px;animation:si .3s ease}
@keyframes si{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.ey{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--bw);font-weight:600;margin-bottom:5px}
.ttl{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;line-height:1.2;color:var(--br);margin-bottom:5px}
.ttl em{font-style:italic;color:var(--bw)}
.sub{font-size:13px;color:var(--mu);line-height:1.65;margin-bottom:16px;font-weight:300}
.hint{font-size:11px;color:var(--bw);font-weight:600;margin-bottom:9px}
.nin{width:100%;font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:300;font-style:italic;border:none;border-bottom:2px solid var(--cd);background:transparent;color:var(--br);padding:7px 0;outline:none;transition:border-color .2s}
.nin:focus{border-color:var(--bw)}
.nin::placeholder{color:var(--cd)}
.slbl{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--bw);font-weight:600;margin:14px 0 6px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}
.g1{display:flex;flex-direction:column;gap:7px;margin-bottom:6px}
.card{background:var(--wh);border:2px solid var(--cd);border-radius:13px;padding:11px 10px;cursor:pointer;transition:all .18s;position:relative;text-align:center;box-shadow:0 1px 5px rgba(46,26,14,.06)}
.card:active{transform:scale(.97)}
.card.on{border-color:var(--bw);background:linear-gradient(135deg,#fff8f4,#fdf0e8)}
.card.row{display:flex;align-items:flex-start;gap:9px;text-align:left;padding:11px}
.cico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ce{font-size:22px;display:block;margin-bottom:3px}
.cl{font-size:12px;font-weight:600;color:var(--tx);line-height:1.2;margin-bottom:2px}
.cs{font-size:10px;color:var(--mu);font-weight:300;line-height:1.3}
.chk{position:absolute;top:5px;right:5px;width:16px;height:16px;border-radius:50%;background:var(--bw);color:white;font-size:9px;display:none;align-items:center;justify-content:center;font-weight:700}
.card.on .chk{display:flex}
.chal{background:var(--wh);border:2px solid var(--cd);border-radius:9px;padding:11px 13px;cursor:pointer;margin-bottom:6px;position:relative;transition:all .18s;box-shadow:0 1px 4px rgba(46,26,14,.05)}
.chal:active{transform:scale(.99)}
.chal.on{border-color:var(--bw);background:#fff8f4}
.chal .chk{display:none}
.chal.on .chk{display:flex}
.ct{font-size:13px;font-weight:500;color:var(--tx);line-height:1.4}
.cs2{font-size:10px;color:var(--mu);margin-top:2px}
.cgrp{margin-bottom:11px}
.cgl{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--mu);font-weight:600;margin-bottom:6px}
.crow{display:flex;flex-wrap:wrap;gap:7px}
.cwrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.csw{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;position:relative;box-shadow:0 1px 5px rgba(0,0,0,.12);transition:all .18s}
.csw.on{border-color:var(--br);transform:scale(1.12)}
.csw .ck2{display:none;position:absolute;inset:0;align-items:center;justify-content:center;font-size:11px;font-weight:700;border-radius:50%}
.csw.on .ck2{display:flex}
.cswl{font-size:7px;color:var(--mu);text-align:center;width:34px;line-height:1.2}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px}
.chip{padding:7px 11px;border-radius:100px;border:2px solid var(--cd);background:var(--wh);font-size:11px;font-weight:500;color:var(--mu);cursor:pointer;transition:all .15s}
.chip.on{background:var(--bw);border-color:var(--bw);color:white}
.bvsec{margin-bottom:12px}
.bvl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:6px}
.bvl.pos{color:var(--bw)}
.bvl.neg{color:#5c3317}
.favin{width:100%;font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:300;border:none;border-bottom:2px solid var(--cd);background:transparent;color:var(--br);padding:6px 0;outline:none;margin-bottom:13px;transition:border-color .2s}
.favin:focus{border-color:var(--bw)}
.favin::placeholder{color:var(--cd)}
.tagrow{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.tbtn{padding:5px 10px;border-radius:20px;border:1.5px solid var(--cd);background:var(--wh);font-size:11px;font-family:'Jost',sans-serif;color:var(--mu);cursor:pointer}
.tbtn.on{background:var(--br);border-color:var(--br);color:var(--cr)}
.err{font-size:12px;color:#c0392b;margin-top:6px;min-height:16px}
.footer{border-top:1px solid var(--cd);padding:9px 14px calc(var(--sb) + 9px);display:flex;gap:9px;background:var(--wh);flex-shrink:0}
.nxtbtn{flex:1;height:48px;border-radius:100px;background:var(--br);color:var(--cr);border:none;font-family:'Jost',sans-serif;font-size:15px;font-weight:600;cursor:pointer}
.nxtbtn:active{opacity:.85}
.bckbtn{width:48px;height:48px;border-radius:50%;background:var(--cd);border:none;font-size:16px;cursor:pointer;color:var(--mu)}
/* UITSLAG */
.u-hero{background:linear-gradient(135deg,var(--br),#4a2810);margin:12px;border-radius:14px;padding:20px 16px;text-align:center;position:relative;overflow:hidden}
.u-hero::after{content:'✦';position:absolute;right:-6px;bottom:-14px;font-size:85px;color:rgba(255,255,255,.04);pointer-events:none}
.u-ey{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(240,212,192,.6);margin-bottom:6px}
.u-nm{font-family:'Cormorant Garamond',serif;font-size:30px;font-style:italic;font-weight:300;color:white;margin-bottom:2px}
.u-ar{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:rgba(240,212,192,.85);margin-bottom:12px}
.u-tags{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.u-tag{padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);font-size:9px;color:white}
.usec{margin:0 12px 9px;background:var(--wh);border-radius:11px;padding:12px 13px;box-shadow:0 2px 7px rgba(46,26,14,.05)}
.usec-t{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--bw);font-weight:600;margin-bottom:6px}
.usec-b{font-size:13px;color:var(--tx);line-height:1.7;font-weight:300}
.ukracht{background:linear-gradient(135deg,var(--bw),#8b5230);margin:0 12px 9px;border-radius:11px;padding:12px 13px}
.ukracht-t{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:4px}
.ukracht-b{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:white;line-height:1.5}
.uc{display:inline-block;padding:2px 8px;border-radius:20px;background:var(--cd);color:#5c3317;font-size:10px;margin:2px}
.uc.bad{background:#fee4e4;color:#c0392b}
.cdots{display:flex;flex-wrap:wrap;gap:7px}
.cdw{display:flex;flex-direction:column;align-items:center;gap:2px}
.cdot{width:22px;height:22px;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.12)}
.cdotl{font-size:7px;color:var(--mu);text-align:center;width:26px;line-height:1.2}
.ufig{background:linear-gradient(135deg,#fff8f4,#fdf0e8);border-left:3px solid var(--bw);margin:0 12px 9px;border-radius:11px;padding:12px 13px}
.uchal-step{display:flex;gap:7px;margin-bottom:5px;align-items:flex-start}
.uchal-num{min-width:18px;height:18px;border-radius:50%;background:var(--bw);color:white;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.beginbtn{display:block;width:calc(100% - 24px);margin:0 12px 12px;padding:13px;background:var(--br);color:var(--cr);border:none;border-radius:11px;font-size:15px;font-weight:600;font-family:'Jost',sans-serif;cursor:pointer;text-align:center}
</style>
</head>

function onSelfie(e){
  var file=e.target.files[0];if(!file)return;
  ans._selfieFile=file;
  var r=new FileReader();
  r.onload=function(ev){
    var area=document.getElementById('selfie-area');
    if(!area)return;
    document.getElementById('selfie-ph').style.display='none';
    var img=area.querySelector('img')||document.createElement('img');
    img.src=ev.target.result;
    img.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%';
    area.appendChild(img);
    ans._selfieDataUrl=ev.target.result;
  };
  r.readAsDataURL(file);
}
function handleSelfie(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){ans.selfiePreview=ev.target.result;render();};
  r.readAsDataURL(f);
}
function pickAge(v){ans.leeftijd=v;document.querySelectorAll('#age-row .tbtn').forEach(function(b){b.classList.toggle('on',b.textContent===v);});}
function togArr(key,val,max){var a=ans[key]||[];var i=a.indexOf(val);if(i>-1)a.splice(i,1);else{if(a.length>=max)a.shift();a.push(val);}ans[key]=a;render();}
function togKleur(n){var a=ans.kleuren||[];var i=a.indexOf(n);if(i>-1)a.splice(i,1);else a.push(n);ans.kleuren=a;render();}
function setFig(k){ans.figuur=k;render();}
function togIdx(key,i){var a=ans[key]||[];var idx=a.indexOf(i);if(idx>-1)a.splice(idx,1);else a.push(i);ans[key]=a;var all=document.querySelectorAll('[onclick="togIdx(\''+key+'\','+i+')"]');all.forEach(function(el){el.classList.toggle('on',a.indexOf(i)>-1);});}
function setFavCat(cat){ans.favCat=cat;document.querySelectorAll('[onclick^="setFavCat"]').forEach(function(el){el.classList.toggle('on',el.textContent===cat);});}

function next(){
  if(step===0){
    var el=document.getElementById('nin');
    if(el)ans.name=el.value.trim();
    if(!ans.name){
      var err=document.getElementById('name-err');
      if(err)err.textContent='Vul je naam in om verder te gaan.';
      if(el)el.style.borderColor='#c0392b';
      setTimeout(function(){if(err)err.textContent='';if(el)el.style.borderColor='';},2000);
      return;
    }
  }
  if(step===7){var el2=document.getElementById('favin');if(el2&&el2.value.trim())ans.favNaam=el2.value.trim();}
  if(step>=NS){window.location.href='griette_stylist_BETA.html';return;}
  if(step<NS-1){step++;render();}
  else{finish();}
}
function prev(){if(step>0){step--;render();}}

function finish(){

  var verL=(ans.verbergen||[]).map(function(i){return VERS[i];}).filter(Boolean);
  var nogoL=(ans.nogo||[]).map(function(i){return NOGS[i];}).filter(Boolean);
  var kl=ans.kleuren||[];
  var wKl=['Terra','Camel','Bruin','Oker','Oranje','Zand','Olijf'];
  var kKl=['Navy','Kobalt','Smaragd','Paars','Mauve','Lichtblauw'];
  var wc=0,kc=0;kl.forEach(function(k){if(wKl.indexOf(k)>-1)wc++;if(kKl.indexOf(k)>-1)kc++;});
  var kt=wc>kc?'warm':kc>wc?'koel':'neutraal';
  var prof={
    name:ans.name||'Gebruiker',
    selfie:ans.selfiePreview||null,
    leeftijd:ans.leeftijd||'',
    stijlDNA:{

      kibbe:ar.kibbe+(ar2?' / '+ar2.kibbe:''),
      kitchener:ar.kitchener+(ar2?' / '+ar2.kitchener:''),
      uitdagingen:ans.uitdagingen||[],uitstraling:ans.uitstraling||[],
      figuur:fig,figuurTip:figTip,benadruk:benL,verbergen:verL,
      kleuren:kl,kleurtemp:kt,nogo:nogoL,
      favNaam:ans.favNaam||'',favCat:ans.favCat||'',
      beschrijving:ar.beschrijving+(ar2?'\n\n'+ar2.naam+': '+ar2.beschrijving:''),
      kracht:ar.kracht,tip:ar.tip,kw:ar.kw.concat(ar2?ar2.kw.slice(0,2):[]),
      silhouet:ar.silhouet,proporties:ar.proporties,
      materialen:ar.materialen.concat(ar2?ar2.materialen.slice(0,2):[]),

      sleutelitems:ar.sleutelitems.concat(ar2?ar2.sleutelitems.slice(0,2):[])
    }
  };
  try{localStorage.setItem('ss-prof-'+CODE,JSON.stringify(prof));}catch(e){}
  // Upload selfie to Cloudinary if present
  if(ans._selfieFile&&typeof CL_CLOUD!=='undefined'){
    var fd=new FormData();fd.append('file',ans._selfieFile);fd.append('upload_preset',CP||'griette-photos');fd.append('folder','ss/'+CODE.toLowerCase()+'/selfie');
    fetch('https://api.cloudinary.com/v1_1/dhggari0g/image/upload',{method:'POST',body:fd}).then(function(r){return r.json();}).then(function(d){if(d&&d.secure_url){prof.selfieUrl=d.secure_url;try{localStorage.setItem('ss-prof-'+CODE,JSON.stringify(prof));}catch(e){}fetch(SB+'/rest/v1/users',{method:'POST',headers:{'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK,'Prefer':'return=minimal,resolution=merge-duplicates'},body:JSON.stringify({code:CODE,naam:prof.name,style_dna:prof.stijlDNA,selfie_url:d.secure_url,last_seen:new Date().toISOString()})}).catch(function(){});}}).catch(function(){});
  }
  fetch(SB+'/rest/v1/users',{method:'POST',headers:{'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK,'Prefer':'return=minimal,resolution=merge-duplicates'},body:JSON.stringify({code:CODE,naam:prof.name,style_dna:prof.stijlDNA,last_seen:new Date().toISOString()})}).catch(function(){});
  step=NS;render();renderUitslag(prof,ar,ar2,figTip,benL,verL,nogoL);
}

function renderUitslag(prof,ar,ar2,figTip,benL,verL,nogoL){
  if(!prof){try{prof=JSON.parse(localStorage.getItem('ss-prof-'+CODE)||'null');}catch(e){}if(!prof){window.location.href='griette_stylist_BETA.html';return;}}
  var dna=prof.stijlDNA;
  ar=ar||ARCHS[dna.primaryArchetype||'naturel']||ARCHS.naturel;
  ar2=ar2||(dna.archetypes&&dna.archetypes[1]?ARCHS[dna.archetypes[1]]:null);
  figTip=figTip||dna.figuurTip||'';
  benL=benL||dna.benadruk||[];
  verL=verL||dna.verbergen||[];
  nogoL=nogoL||dna.nogo||[];
  var ch0=CHALS[(dna.uitdagingen||['combineren'])[0]]||CHALS.combineren;
  var ch1=dna.uitdagingen&&dna.uitdagingen[1]?CHALS[dna.uitdagingen[1]]:null;
  var klH=(dna.kleuren||[]).map(function(k){var c=CMAP[k]||'#888';return '<div class="cdw"><div class="cdot" style="background:'+c+';'+(k==='Wit'||k==='Creme'?'border:1px solid #DDD':'')+';"></div><div class="cdotl">'+k+'</div></div>';}).join('');
  
  function sec(t,b,accent){
    var style=accent?'border-left:3px solid var(--bw);':'';
    return '<div class="usec" style="'+style+'"><div class="usec-t">'+t+'</div><div class="usec-b">'+b+'</div></div>';
  }
  function chip(t,bad){return '<span class="uc'+(bad?' bad':'')+'">'+(typeof t==='string'?t:t)+'</span>';}

  // Build rich narrative
  var archName=ar.naam+(ar2?' & '+ar2.naam:'');
  var leeftijdCtx=prof.leeftijd?'<br><br>Op jouw leeftijdsgroep ('+prof.leeftijd+') werkt het goed om klassieke basisstukken te combineren met een paar key items die jouw '+ar.kw[0].toLowerCase()+' uitstraling versterken.':'';
  
  var selfieHtml=prof.selfie?'<div style="width:100%;aspect-ratio:3/4;border-radius:14px;overflow:hidden;margin:0 12px 12px;width:calc(100% - 24px)"><img src="'+prof.selfie+'" style="width:100%;height:100%;object-fit:cover"></div>':'';
  
  var h='';
  
  // Hero
  h+='<div class="u-hero">'+
    '<div class="u-ey">Jouw persoonlijk stijlrapport</div>'+
    '<div class="u-nm">'+prof.name+'</div>'+
    '<div class="u-ar">'+archName+'</div>'+
    '<div class="u-tags">'+ar.kw.map(function(k){return '<span class="u-tag">'+k+'</span>';}).join('')+(ar2?ar2.kw.slice(0,2).map(function(k){return '<span class="u-tag" style="background:rgba(155,98,64,.25)">'+k+'</span>';}).join(''):'')+
    '</div></div>';

  // Selfie if uploaded
  h+=selfieHtml;

  // Who you are - rich narrative
  var narrative=ar.beschrijving;
  if(ar2)narrative+='<br><br>De combinatie met <strong>'+ar2.naam+'</strong> maakt je extra bijzonder: '+ar2.beschrijving;
  narrative+=leeftijdCtx;narrative+='<br><br><em style="color:var(--bw)">'+ar.kracht+'</em>';
  h+=sec('Wie jij bent & wat jou onderscheidt', narrative);
  
  // Power statement
  h+='<div class="ukracht"><div class="ukracht-t">Jouw stijlwapen</div><div class="ukracht-b">'+ar.tip+'</div></div>';

  // Kibbe/Kitchener mini context
  h+=sec('De theorie achter jouw stijl',
    '<strong>Kibbe type:</strong> '+ar.kibbe+'<br><strong>Kitchener essence:</strong> '+ar.kitchener+
    '<br><br>Dit vertelt me hoe jouw lichaam het beste tot zijn recht komt in kleding, en welke energie je van nature uitstraalt. Gebruik dit als kompas, niet als kooi.'
  );

  // Silhouette & proportions - narrative
  h+=sec('Silhouet, proporties & vormen',
    ar.silhouet+'<br><br><strong>Proportieregel:</strong> '+ar.proporties+
    (figTip?'<br><br><strong>Jouw figuur ('+dna.figuur+'):</strong> '+figTip:'')+
    (benL.length?'<br><br><em>Benadrukken: '+benL.join(', ')+'</em>':'')+
    (verL.length?'<br><em>Minder zichtbaar: '+verL.join(', ')+'</em>':'')
  );

  // Materials
  h+=sec('Materialen die voor jou werken',
    'De juiste stof maakt of breekt een outfit — ongeacht het design.<br><br>'+
    '<strong>Je gaat voor:</strong> '+ar.materialen.join(', ')+
    '<br><strong>Je vermijdt:</strong> '+ar.materialen_vermijd.join(', ')
  );

  // Colors
  if(klH)h+=sec('Jouw kleurenpalet ('+dna.kleurtemp+')',
    '<div class="cdots" style="margin-bottom:10px">'+klH+'</div>'+
    '<strong>Basis:</strong> '+ar.kleuren_basis.join(', ')+'<br>'+
    '<strong>Accent:</strong> '+ar.kleuren_accent.join(', ')
  );

  // Key items
  h+=sec('De sleutelitems voor jouw garderobe',
    'Dit zijn de items die alles bij elkaar houden:<br><div style="margin-top:8px">'+ar.sleutelitems.map(function(i){return chip(i,false);}).join('')+'</div>'
  );

  // Coaching section - what we work on together
  h+='<div class="usec" style="border-left:3px solid var(--bw)">'+
    '<div class="usec-t">Waar we samen aan werken</div>'+
    '<div class="usec-b">'+
      'Op basis van jouw antwoorden herken ik dit als jouw grootste stijlthema:<br><br>'+
      '<strong style="color:var(--bw)">'+ch0.d+'</strong><br>'+
      ch0.tip+
      '<br><br>'+
      '<div style="font-size:10px;font-weight:600;color:var(--mu);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">Concrete eerste stappen:</div>'+
      [ch0.s1,ch0.s2,ch0.s3].map(function(s,i){return '<div style="display:flex;gap:8px;margin-bottom:6px;align-items:flex-start"><div style="min-width:18px;height:18px;border-radius:50%;background:var(--bw);color:white;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px">'+(i+1)+'</div><div style="font-size:12px;line-height:1.5">'+s+'</div></div>';}).join('')+
      (ch1?'<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--cd)"><strong>Ook: '+ch1.d+'</strong><br><span style="font-size:12px">'+ch1.tip+'</span></div>':'')+
    '</div></div>';

  // No-gos if any
  if(nogoL.length)h+=sec("Jouw bewuste no-go's",
    'Dit helpt me om je nooit iets voor te stellen wat niet bij je past:<br><div style="margin-top:8px">'+nogoL.map(function(n){return chip(n,true);}).join('')+'</div>'
  );

  // Favourite item
  if(dna.favNaam)h+=sec('Jouw ankerstuk: '+dna.favNaam+(dna.favCat?' ('+dna.favCat+')':''),
    'Dit item gebruik ik als vertrekpunt voor combinatieadvies. Alles wat ik voorstel moet hiermee kunnen werken — of er bewust van afwijken op de beste manier.'
  );

  // CTA
  h+='<a href="griette_stylist_BETA.html" style="display:block;width:calc(100% - 24px);margin:4px 12px 16px;padding:14px;background:var(--br);color:var(--cr);border:none;border-radius:11px;font-size:15px;font-weight:600;font-family:Jost,sans-serif;cursor:pointer;text-align:center;text-decoration:none">Begin met je garderobe opbouwen &rarr;</a>';
  
  document.getElementById('content').innerHTML=h;
  document.getElementById('content').scrollTop=0;
}
render();
</script>
</body>
</html>
