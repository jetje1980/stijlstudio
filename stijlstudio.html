<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Stijl Studio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#1C1612}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:32px;font-family:Georgia,serif}
.logo{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(240,212,192,.6);margin-bottom:40px}
.title{font-size:46px;font-style:italic;font-weight:300;color:white;text-align:center;line-height:1.1;margin-bottom:10px}
.title b{color:#C4714A;font-weight:300}
.sub{font-size:14px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:48px;line-height:1.7;max-width:260px;font-family:Arial,sans-serif;font-weight:300}
#code{width:100%;max-width:290px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.18);border-radius:12px;padding:17px 16px;font-size:22px;color:white;text-align:center;outline:none;letter-spacing:.12em;margin-bottom:12px;display:block;font-family:Georgia,serif}
#btn{width:100%;max-width:290px;height:54px;border-radius:100px;background:#C4714A;color:white;border:none;font-size:15px;font-weight:700;display:block;cursor:pointer;font-family:Arial,sans-serif}
#err{font-size:13px;color:#E88080;text-align:center;margin-top:12px;min-height:20px;font-family:Arial,sans-serif}
.foot{position:fixed;bottom:20px;font-size:10px;color:rgba(255,255,255,.15);letter-spacing:.1em;text-transform:uppercase;font-family:Arial,sans-serif}
</style>
</head>
<body>
<div class="logo">Stijl Studio &middot; Prive Beta</div>
<div class="title">Jouw<br><b>stijl</b> begint<br>hier.</div>
<div class="sub">Je hebt een toegangscode nodig. Geen code? Stuur een berichtje naar Griette.</div>
<input id="code" type="text" placeholder="Jouw code" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
<button id="btn" type="button" onclick="
var c=document.getElementById('code').value.trim().toUpperCase();
var e=document.getElementById('err');
e.textContent='';
if(!c){e.textContent='Vul je code in.';return;}
var ok={'SS-GRIET':1,'SS-EVA25':1,'SS-INEZ25':1};
if(!ok[c]){e.textContent='Ongeldige code: '+c;return;}
try{localStorage.setItem('ss-code',c);}catch(x){}
document.getElementById('btn').textContent='...';
window.location.href='stijlstudio_app.html';
">Toegang &rarr;</button>
<div id="err"></div>
<div class="foot">&copy; 2025 Stijl Studio &middot; Vertrouwelijk</div>

<script>
document.getElementById('code').onkeydown=function(e){if(e.key==='Enter')document.getElementById('btn').click();};
try{var s=localStorage.getItem('ss-code');if(s&&{'SS-GRIET':1,'SS-EVA25':1,'SS-INEZ25':1}[s]){window.location.href='stijlstudio_app.html';}}catch(e){}
</script>
</body>
</html>
