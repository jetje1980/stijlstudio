<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stijl Studio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1C1612;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;font-family:Georgia,serif}
.logo{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(240,212,192,.6);margin-bottom:40px;text-align:center}
h1{font-size:46px;font-style:italic;font-weight:300;color:white;text-align:center;line-height:1.1;margin-bottom:10px}
h1 b{color:#C4714A;font-weight:300}
.sub{font-size:14px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:48px;line-height:1.7;max-width:260px;font-family:Arial,sans-serif}
#codein{display:block;width:100%;max-width:290px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.18);border-radius:12px;padding:17px 16px;font-size:22px;color:white;text-align:center;outline:none;letter-spacing:.12em;margin-bottom:12px;font-family:Georgia,serif}
#gobtn{display:block;width:100%;max-width:290px;height:54px;border-radius:100px;background:#C4714A;color:white;border:none;font-size:16px;font-weight:700;font-family:Arial,sans-serif;cursor:pointer}
#errmsg{font-size:13px;color:#E88080;text-align:center;margin-top:12px;min-height:20px;font-family:Arial,sans-serif}
</style>
</head>
<body>
<div class="logo">Stijl Studio &middot; Prive Beta</div>
<h1>Jouw<br><b>stijl</b> begint<br>hier.</h1>
<div class="sub">Je hebt een toegangscode nodig. Geen code? Stuur een berichtje naar Griette.</div>
<input id="codein" type="text" placeholder="Jouw code" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
<button id="gobtn">Toegang</button>
<div id="errmsg"></div>
<script>
function doLogin() {
  var c = document.getElementById('codein').value.trim().toUpperCase();
  var e = document.getElementById('errmsg');
  e.textContent = '';
  if (!c) { e.textContent = 'Vul je code in.'; return; }
  var ok = {'SS-GRIET':1,'SS-EVA25':1,'SS-INEZ25':1};
  if (!ok[c]) { e.textContent = 'Ongeldige code.'; return; }
  try { localStorage.setItem('ss-code', c); } catch(x) {}
  document.getElementById('gobtn').textContent = '...';
  window.location.href = 'griette_stylist_BETA.html';
}
document.getElementById('gobtn').onclick = doLogin;
document.getElementById('codein').onkeydown = function(ev) {
  if (ev.key === 'Enter') doLogin();
};
</script>
</body>
</html>
